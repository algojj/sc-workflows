name: Reusable Deploy

on:
  workflow_call:
    inputs:
      k8s_deployment:
        description: 'K8s deployment name'
        required: true
        type: string
      image_name:
        description: 'Docker image name (without registry)'
        required: true
        type: string
    secrets:
      GHCR_TOKEN:
        required: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image: ${{ steps.version.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="v$(cat VERSION 2>/dev/null || echo '3.22.1')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/algojj/${{ inputs.image_name }}:$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/algojj/${{ inputs.image_name }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/algojj/${{ inputs.image_name }}:latest

  deploy-k3s:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Deploy to K3s
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          DEPLOY="${{ inputs.k8s_deployment }}"
          
          echo "Deploying $DEPLOY with $IMAGE"
          
          sudo kubectl set image deployment/$DEPLOY \
            $DEPLOY=$IMAGE \
            -n smallcaps-prod
          
          sudo kubectl rollout status deployment/$DEPLOY \
            -n smallcaps-prod --timeout=180s
          
          echo "Deploy OK: $DEPLOY"
